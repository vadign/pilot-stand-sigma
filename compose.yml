name: sigma

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./deploy/docker/sigma.env
    ports:
      - "127.0.0.1:5173:5173"
    expose:
      - "5173"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173/live-data/manifest.json').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${SIGMA_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
